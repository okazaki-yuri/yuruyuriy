name: "CI"

on:
  pull_request:        # PR の作成・更新ごとに実行（Checks タブに結果が出る）
  push:
    branches: [master] # マージ後の master も壊れていないか確認

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        # バージョンはルート package.json の packageManager フィールドから解決される
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11 (packageManagerで固定) が Node.js v22.13 以上を要求する
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck              # tsc --noEmit（ビルドより先に型エラーを検出）

      - name: Build (static export)
        run: pnpm build                  # OG画像/アイコン生成 + next build → apps/web/out/
